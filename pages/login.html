<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FinanzasApp — Login</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                "surface-container-highest": "#e0e3e5",
                "on-tertiary-fixed-variant": "#005321",
                "on-secondary-fixed-variant": "#3f465c",
                "on-surface-variant": "#3c4a42",
                "on-primary-fixed": "#002113",
                "inverse-on-surface": "#eff1f3",
                "surface-container-low": "#f2f4f6",
                "outline-variant": "#bbcabf",

                "surface": "#f7f9fb",

                "tertiary": "#006e2f",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: radial-gradient(circle at top right, #10b981 0%, transparent 40%),
                        radial-gradient(circle at bottom left, #006c49 0%, transparent 40%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- Top Navigation Anchor (Suppressed based on Transactional Rule but visual logo kept) -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center px-6 py-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-3xl">account_balance</span>
<span class="font-headline font-black text-2xl tracking-tight text-on-secondary-fixed">Financial Curator</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen flex items-center justify-center p-6 bg-login-gradient">
<!-- Main Content Canvas -->
<main class="min-h-screen flex items-center justify-center p-6 bg-login-gradient">
<!-- Auth Card Container -->
<section class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl shadow-[0_20px_40px_rgba(19,27,46,0.06)] overflow-hidden relative border border-outline-variant/10">
<!-- Tab Switcher -->
<nav class="flex w-full bg-surface-container-low p-1.5 rounded-t-xl" id="auth-tabs">
<!-- Active Tab: Iniciar Sesión -->
<button class="flex-1 py-3 px-4 rounded-lg text-sm font-semibold transition-all duration-200 bg-surface-container-lowest text-on-secondary-fixed shadow-sm" id="tab-login">
                    Iniciar Sesión
                </button>
<!-- Inactive Tab: Registrarse -->
<button class="flex-1 py-3 px-4 rounded-lg text-sm font-semibold transition-all duration-200 text-on-surface-variant hover:text-on-secondary-fixed" id="tab-register">
                    Registrarse
                </button>
</nav>
<!-- Form Content -->
<div class="p-8 md:p-10">
<!-- Editorial Header -->
<div class="mb-8" id="auth-header">
<h1 class="font-headline text-2xl font-bold text-on-secondary-fixed mb-2 tracking-tight" id="auth-title">Bienvenido de nuevo</h1>
<p class="text-on-surface-variant text-sm leading-relaxed" id="auth-subtitle">Gestiona tu futuro académico y financiero con precisión.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" id="login-form">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="email">Correo Electrónico</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest outline-none rounded-lg transition-all text-sm placeholder:text-outline/60" id="email" placeholder="estudiante@universidad.edu.co" type="email" required/>
</div>
<span class="text-error text-[11px] font-medium hidden" id="error-email"></span>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">Contraseña</label>
<a class="text-[11px] font-bold text-primary hover:text-primary-container transition-colors uppercase tracking-tight" href="#">¿Olvidaste tu clave?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest outline-none rounded-lg transition-all text-sm placeholder:text-outline/60" id="password" placeholder="••••••••••••" type="password" required/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors toggle-password" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<span class="text-error text-[11px] font-medium hidden" id="error-password"></span>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit" id="btn-login">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>

<!-- Registration Form (Hidden by default) -->
<form action="#" class="space-y-4 hidden" id="register-form">
<!-- Name Field -->
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="reg-nombre">Nombre Completo</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest outline-none rounded-lg transition-all text-sm" id="reg-nombre" placeholder="Juan Pérez" type="text" required/>
<span class="text-error text-[11px] font-medium hidden" id="error-reg-nombre"></span>
</div>
<!-- Email Field -->
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="reg-email">Correo Institucional</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest outline-none rounded-lg transition-all text-sm" id="reg-email" placeholder="usuario@ejemplo.com" type="email" required/>
<span class="text-error text-[11px] font-medium hidden" id="error-reg-email"></span>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="reg-password">Contraseña</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest outline-none rounded-lg transition-all text-sm" id="reg-password" placeholder="Mínimo 6 caracteres" type="password" required/>
<span class="text-error text-[11px] font-medium hidden" id="error-reg-password"></span>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="reg-password-confirm">Confirmar Contraseña</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:bg-surface-container-lowest outline-none rounded-lg transition-all text-sm" id="reg-password-confirm" placeholder="Repite tu contraseña" type="password" required/>
<span class="text-error text-[11px] font-medium hidden" id="error-reg-password-confirm"></span>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit" id="btn-register">
<span>Crear Cuenta</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">person_add</span>
</button>
</div>
</form>

<!-- Alternative Methods (Google/Facebook) -->
<div class="mt-8" id="alternative-auth">
<div class="relative flex items-center justify-center mb-6">
<div class="w-full border-t border-outline-variant/30"></div>
<span class="absolute bg-surface-container-lowest px-4 text-[10px] uppercase tracking-widest text-outline font-bold">O continuar con</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant/30 rounded-xl hover:bg-surface-container-low transition-colors text-sm font-medium text-on-secondary-fixed">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCILwvWwoXJo1twnjRKRWh2CaVF-cQ3R9yxBcwS5GIyejTgoIyOPuDmyALDxrUPHeS5_W0LQ-aLdIVQMKiSpR0Ly7TJAvGxTSk7Fb8Yis4FSvTJ9IWuvQhYTLJ8pR0zpR61Cb7YnD3T8v2lOa4Wt9OWlLyVg5RanKngWNAjgGw-CoN2NDFn1zS798JDfW9jYUG00Nusn_ynN0f7yHlCN6_6GcxD9nlOFbv8mxWkLyJ_THt1G5XaKMsPQzUEnt1Ag9zprUZPJVgQxRE"/>
                            Google
                        </button>
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant/30 rounded-xl hover:bg-surface-container-low transition-colors text-sm font-medium text-on-secondary-fixed">
<span class="material-symbols-outlined text-2xl text-[#1877F2]">social_leaderboard</span>
                            Facebook
                        </button>
</div>
</div>
</div>
<!-- Footer Narrative -->
<footer class="bg-surface-container-low p-6 text-center">
<p class="text-[11px] text-on-surface-variant/80 uppercase tracking-widest">
                    Seguridad de Grado Académico • 256-bit SSL
                </p>
</footer>
</section>
</main>

<!-- Scripts -->
<script src="../assets/js/api.js"></script>
<script src="../assets/js/session.js"></script>
<script src="../assets/js/login.js"></script>
</body></html>
